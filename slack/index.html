<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tailwind Slack</title>
  <link rel="stylesheet" href="output.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>
<navbar class="flex p-6 h-[50px] w-full items-center justify-between  sm:pr-6 sm:pl-6 sticky top-0 z-50 lg:top-2.5 bg-white lg:rounded-3xl lg:ml-10 lg:w-[95%] shadow-2xl ">
  <div class="nav-left flex gap-5">
   <img class="h-[50px] w-[100px]" src="slack-salesforce-logo-nav-black@2x.png" alt="">
   <div class="flex gap-10 items-center hidden lg:flex">
    <a href="#" class="flex items-center gap-2.5">Features
      <i class="fa-solid fa-angle-down"></i>
    </a>
    <a href="#" class="flex items-center gap-2.5">Solutions
      <i class="fa-solid fa-angle-down"></i>
    </a>
    <a href="#">Enterprise</a>
    <a href="#" class="flex items-center gap-2.5">Resources
      <i class="fa-solid fa-angle-down"></i>
    </a>
    <a href="#">Pricing</a>
  </div>
   
  </div>
  <div class="nav-right flex items-center justify-evenly gap-4 text-xl">
    <i class="fa-solid fa-magnifying-glass"></i>
    <div class="sign hidden lg:flex text-lg">Sign in</div>
    <div class="request  text-[#4A154B] uppercase border border-[#4A154B] rounded-[5px] hidden lg:flex h-[40px] w-[200px] pt-1 pl-3.5 pr-3.5">Request a demo</div>
    <button class="text-xl bg-[#4A154B] text-white rounded-[5px] p-1 font-'[Hanken_Grotesk]' h-[40px] w-[150px] ">Get Started</button>
    <div class="lg:hidden">
  <i class="fa-solid fa-bars text-xl"></i>
</div>
  </div>
</navbar>
<main class="main flex-col justify-around relative h-dvh pt-5">

    <h1 class="text-center text-4xl font-semibold p-6 font-sans">All your people and AI agents <br> working together.</h1>
  <p class="text-center text-wrap text-break">Slack connects your team.Slackbot multiplies what they can do.</p>
  <div class="btn flex flex-col items-center justify-center gap-5 m-5 lg:flex-row">
  <button class="text-xl flex justify-center items-center bg-[#4A154B] text-white rounded-[5px] font-'[Hanken_Grotesk]' h-[60px] w-[350px]">Get Started</button>
  <div class="flex items-center justify-center  text-[#4A154B] uppercase border border-[#4A154B] rounded-[5px]  h-[80px] w-[350px] ">Find your Subscription <i class="fa-solid fa-arrow-right"></i></div>
  </div>
  
  </div>
  
  <div class="transition flex items-center justify-center gap-10 mt-10" >
    <p class="text-sm hidden lg:flex text-gray-600">Trusted by top teams</p>
    <img class="h-[50px] w-[50px]  " src="logo-gm-small@2x.png" alt="">
    <img class="h-[50px] w-[50px] " src="logo-openai-small@2x.png" alt="">
    <img class="h-[50px] w-[50px]  " src="logo-target-small@2x.png" alt="">
    <img class="h-[50px] w-[50px] "src="logo-paramount-small@2x.png" alt="">
    <img class="h-[50px] w-[50px] " src="logo-stripe-small@2x.png" alt="">
    <img class="h-[50px] w-[50px]  "src="logo-ibm-small@2x.png" alt="">

  <p class="text-[#4A154B] font-bold text-xl  m-5 hidden lg:none">Ask Slackbot</p>
  <div class="video flex items-center justify-center m-5  ">
   <video class="h-auto max-w-[90%] lg:max-w-[50rem] rounded-sm" autoplay loop src="video-3p-app-orchestration.IN@2x.webm"></video>
  </div>
